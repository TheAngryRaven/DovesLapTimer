name: Docs

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Build on every push/PR (so PRs catch a broken Doxyfile or dead doc link
# before merge), but only deploy to gh-pages on push to master.
permissions:
  contents: write

jobs:
  build:
    name: Doxygen build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Show versions
        run: |
          doxygen --version
          dot -V

      - name: Build docs
        run: doxygen Doxyfile

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-build/html
          publish_branch: gh-pages
          # Keep the gh-pages branch lean — overwrite, don't accumulate.
          force_orphan: true
